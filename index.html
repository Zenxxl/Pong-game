<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Classic Pong</h1>
    <div class="game-mode-selection">
        <button id="onePlayerBtn">1 Jugador</button>
        <button id="twoPlayersBtn">2 Jugadores</button>
    </div>
    <div class="difficulty-selection">
        <button id="easyBtn">Fácil</button>
        <button id="normalBtn">Normal</button>
        <button id="hardBtn">Difícil</button>
    </div>

    <div id="overlay" class="game-overlay active">
        <div class="overlay-content">
            <h2 id="overlayTitle">PONG CLÁSICO</h2>
            <p id="overlayMessage">Presiona ESPACIO para iniciar el juego</p>

            
            <div class="volume-control" style="display: none;">
                <label for="volumeSlider">Volumen:</label>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.3">
            </div>
            

            <button id="overlayButton" style="display: none;">Reanudar / Reiniciar</button>
            <p class="controls-info">
                Jugador 1: W (Arriba), S (Abajo) <br>
                Jugador 2: Flecha Arriba, Flecha Abajo (Solo en modo 2 Jugadores)
            </p>
        </div>
    </div>

    <canvas id="pongCanvas" width="800" height="600"></canvas>
    <script src="script.js"></script>
</body>
</html>
